<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AILattice RLWE 参数助手 Preview</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7f6;
        --panel: #ffffff;
        --text: #17211f;
        --muted: #5f6c68;
        --line: #d8dfdb;
        --green: #0f766e;
        --green-dark: #115e59;
        --blue: #22577a;
        --amber: #a16207;
        --red: #b42318;
        --shadow: 0 18px 45px rgba(23, 33, 31, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app-shell {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        min-height: 100vh;
      }

      .control-panel {
        border-right: 1px solid var(--line);
        background: #fbfcfb;
        padding: 24px;
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 30px;
      }

      .brand-mark {
        display: grid;
        width: 40px;
        height: 40px;
        place-items: center;
        border-radius: 8px;
        background: var(--green);
        color: #fff;
        font-weight: 800;
      }

      .brand-row h1,
      .brand-row p,
      .top-strip h2,
      .top-strip p,
      .detail-column h3,
      .section-heading h3 {
        margin: 0;
      }

      .brand-row h1 {
        font-size: 18px;
        line-height: 1.2;
      }

      .brand-row p {
        color: var(--muted);
        font-size: 13px;
      }

      .config-panel,
      .form-stack {
        display: grid;
      }

      .config-panel {
        gap: 5px;
        margin-bottom: 22px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .config-panel span,
      .config-panel small {
        color: var(--muted);
        font-size: 12px;
      }

      .config-panel strong {
        overflow-wrap: anywhere;
        font-size: 13px;
      }

      .preview-note {
        border-color: #f0d58a;
        background: #fff8e6;
      }

      .form-stack {
        gap: 18px;
      }

      .form-stack label,
      fieldset {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        border: 0;
      }

      .form-stack span,
      legend {
        color: var(--muted);
        font-size: 13px;
        font-weight: 650;
      }

      input,
      select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        padding: 0 12px;
      }

      input:focus,
      select:focus,
      button:focus-visible {
        outline: 3px solid rgba(15, 118, 110, 0.22);
        outline-offset: 2px;
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #fff;
      }

      .segmented label {
        min-width: 0;
      }

      .segmented input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .segmented span {
        display: grid;
        min-height: 40px;
        place-items: center;
        color: var(--text);
        cursor: pointer;
      }

      .segmented label + label span {
        border-left: 1px solid var(--line);
      }

      .segmented input:checked + span {
        background: var(--green);
        color: #fff;
      }

      .check-row {
        grid-template-columns: 18px 1fr;
        align-items: center;
      }

      .check-row input {
        width: 18px;
        min-height: 18px;
        accent-color: var(--green);
      }

      .primary-button,
      .secondary-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 42px;
        border-radius: 8px;
        border: 1px solid transparent;
        cursor: pointer;
        font-weight: 750;
      }

      .primary-button {
        background: var(--green);
        color: #fff;
      }

      .primary-button:hover {
        background: var(--green-dark);
      }

      .secondary-button {
        background: #fff;
        color: var(--blue);
        border-color: var(--line);
        padding: 0 12px;
      }

      .button-icon {
        color: inherit;
        font-size: 18px;
      }

      .workspace {
        min-width: 0;
        padding: 28px;
      }

      .top-strip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 74px;
        border-bottom: 1px solid var(--line);
        margin-bottom: 22px;
      }

      .top-strip h2 {
        font-size: 24px;
      }

      .top-strip p {
        color: var(--muted);
        margin-top: 4px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 96px;
        min-height: 32px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        font-size: 13px;
        font-weight: 750;
      }

      .status-pill.idle {
        color: var(--muted);
        background: #fff;
      }

      .status-pill.loading {
        color: var(--blue);
        background: #eef7fb;
      }

      .status-pill.done {
        color: var(--green-dark);
        background: #e8f5f2;
      }

      .status-pill.error {
        color: var(--red);
        background: #fff1f0;
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 18px;
      }

      .metric-panel,
      .detail-column,
      .json-panel,
      .warning-band {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .metric-panel {
        display: grid;
        align-content: start;
        gap: 8px;
        min-height: 132px;
        padding: 16px;
      }

      .metric-panel span,
      .metric-panel small,
      dt {
        color: var(--muted);
      }

      .metric-panel strong {
        font-size: 30px;
        line-height: 1.1;
      }

      .metric-panel small {
        overflow-wrap: anywhere;
      }

      .meter {
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: #e9eeeb;
      }

      .meter div {
        width: 0;
        height: 100%;
        background: var(--green);
        transition: width 160ms ease;
      }

      .details-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 14px;
        margin-bottom: 18px;
      }

      .detail-column {
        padding: 18px;
      }

      .detail-column h3,
      .section-heading h3 {
        font-size: 16px;
      }

      dl {
        display: grid;
        grid-template-columns: 150px minmax(0, 1fr);
        gap: 10px 14px;
        margin: 16px 0 0;
      }

      dt {
        font-size: 13px;
      }

      dd {
        margin: 0;
        overflow-wrap: anywhere;
      }

      .warning-band {
        padding: 14px 16px;
        margin-bottom: 18px;
        color: #6f4d00;
        background: #fff8e6;
      }

      .warning-band p {
        margin: 4px 0;
      }

      .alternatives {
        margin-bottom: 18px;
      }

      .section-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .candidate-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .candidate {
        display: grid;
        gap: 8px;
        min-height: 122px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 14px;
      }

      .candidate strong {
        font-size: 15px;
      }

      .candidate span {
        color: var(--muted);
        font-size: 13px;
      }

      .json-panel {
        overflow: auto;
        max-height: 460px;
        padding: 0;
      }

      pre {
        margin: 0;
        padding: 16px;
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 920px) {
        .app-shell {
          grid-template-columns: 1fr;
        }

        .control-panel {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .result-grid,
        .details-layout,
        .candidate-list {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        .workspace,
        .control-panel {
          padding: 18px;
        }

        .top-strip {
          align-items: flex-start;
          flex-direction: column;
        }

        dl {
          grid-template-columns: 1fr;
          gap: 4px;
        }

        .result-grid,
        .details-layout,
        .candidate-list {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="control-panel">
        <div class="brand-row">
          <div class="brand-mark">A</div>
          <div>
            <h1>AILattice</h1>
            <p>Local RLWE 参数助手</p>
          </div>
        </div>

        <div class="config-panel preview-note">
          <span>预览模式</span>
          <strong>单文件静态页面</strong>
          <small>不会调用模型、Sage 或 lattice-estimator</small>
          <small>结果来自当前原型的本地样例输出</small>
        </div>

        <form id="parameter-form" class="form-stack">
          <label>
            <span>多项式形式</span>
            <select id="ring-family" name="ringFamily">
              <option value="power2">x^n + 1</option>
              <option value="ternary">x^n - x^(n/2) + 1</option>
            </select>
          </label>

          <label>
            <span>目标安全级别</span>
            <select id="target-security" name="targetSecurity">
              <option value="80">80</option>
              <option value="128" selected>128</option>
              <option value="192">192</option>
              <option value="256">256</option>
              <option value="384">384</option>
              <option value="512">512</option>
            </select>
          </label>

          <fieldset>
            <legend>安全口径</legend>
            <div class="segmented">
              <label><input type="radio" name="securityModel" value="matzov" checked /><span>MATZOV</span></label>
              <label><input type="radio" name="securityModel" value="min" /><span>两者</span></label>
              <label><input type="radio" name="securityModel" value="classical" /><span>经典</span></label>
              <label><input type="radio" name="securityModel" value="quantum" /><span>量子</span></label>
            </div>
          </fieldset>

          <label>
            <span>Reduction cost model</span>
            <select id="red-cost-model" name="redCostModel">
              <option value="matzov">MATZOV</option>
              <option value="adps16">ADPS16 / CoreSVP</option>
            </select>
          </label>

          <label>
            <span id="ntt-scale-label">NTT 尺度：n | q - 1</span>
            <input id="ntt-scale" name="nttScalePower" type="range" min="-1" max="5" step="1" value="1" />
          </label>

          <label>
            <span>最小模数位数</span>
            <input id="min-q-bits" name="minQBits" type="number" min="2" max="63" step="1" value="2" />
          </label>

          <label>
            <span>最大模数位数</span>
            <input id="max-q-bits" name="maxQBits" type="number" min="12" max="63" step="1" value="24" />
          </label>

          <label>
            <span>分布</span>
            <select name="distribution">
              <option value="auto">Auto</option>
              <option value="centered_binomial">Centered Binomial</option>
              <option value="sparse_ternary">Sparse Ternary</option>
            </select>
          </label>

          <label class="check-row">
            <input id="use-estimator" name="useEstimator" type="checkbox" />
            <span>Sage estimator 精算推荐</span>
          </label>

          <button class="primary-button" type="submit">
            <span class="button-icon">↻</span>
            生成推荐
          </button>
        </form>
      </aside>

      <main class="workspace">
        <section class="top-strip">
          <div>
            <h2 id="summary-title">等待输入</h2>
            <p id="summary-subtitle">选择目标后生成 RLWE 实例。</p>
          </div>
          <div id="status-pill" class="status-pill idle">Preview</div>
        </section>

        <section id="result-grid" class="result-grid hidden">
          <div class="metric-panel">
            <span>经典安全</span>
            <strong id="classic-bits">-</strong>
            <div class="meter"><div id="classic-meter"></div></div>
          </div>
          <div class="metric-panel">
            <span>量子安全</span>
            <strong id="quantum-bits">-</strong>
            <div class="meter"><div id="quantum-meter"></div></div>
          </div>
          <div class="metric-panel">
            <span>环维度</span>
            <strong id="ring-n">-</strong>
            <small id="ring-poly">-</small>
          </div>
          <div class="metric-panel">
            <span>模数</span>
            <strong id="modulus-q">-</strong>
            <small id="modulus-bits">-</small>
          </div>
          <div class="metric-panel">
            <span>目标口径</span>
            <strong id="selected-bits">-</strong>
            <small id="security-margin">-</small>
          </div>
        </section>

        <section id="details" class="details-layout hidden">
          <div class="detail-column">
            <h3>实例</h3>
            <dl id="instance-list"></dl>
          </div>
          <div class="detail-column">
            <h3>估计</h3>
            <dl id="security-list"></dl>
          </div>
        </section>

        <section id="warnings" class="warning-band hidden"></section>

        <section id="alternatives" class="alternatives hidden">
          <div class="section-heading">
            <h3>备选候选</h3>
            <button id="copy-json" type="button" class="secondary-button">复制 JSON</button>
          </div>
          <div id="candidate-list" class="candidate-list"></div>
        </section>

        <section id="json-panel" class="json-panel hidden">
          <pre id="json-output"></pre>
        </section>
      </main>
    </div>

    <script>
      const form = document.querySelector("#parameter-form");
      const statusPill = document.querySelector("#status-pill");
      const title = document.querySelector("#summary-title");
      const subtitle = document.querySelector("#summary-subtitle");
      const resultGrid = document.querySelector("#result-grid");
      const details = document.querySelector("#details");
      const warnings = document.querySelector("#warnings");
      const alternatives = document.querySelector("#alternatives");
      const jsonPanel = document.querySelector("#json-panel");
      const jsonOutput = document.querySelector("#json-output");
      const copyJson = document.querySelector("#copy-json");
      const nttScale = document.querySelector("#ntt-scale");
      const nttScaleLabel = document.querySelector("#ntt-scale-label");
      const ringFamily = document.querySelector("#ring-family");

      const commonWarning = "当前为 RLWE/LWE 快速筛选；未绑定具体方案，因此不计算解密错误率或签名失败率。";
      let lastResult = null;

      const samples = {
        power2: makePower2Sample(),
        ternary: makeTernarySample(),
      };

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        requestRecommendation();
      });

      copyJson.addEventListener("click", async () => {
        if (!lastResult) return;
        try {
          await navigator.clipboard.writeText(JSON.stringify(lastResult.recommendation, null, 2));
          copyJson.textContent = "已复制";
        } catch (_error) {
          copyJson.textContent = "复制不可用";
        }
        setTimeout(() => {
          copyJson.textContent = "复制 JSON";
        }, 1200);
      });

      nttScale.addEventListener("input", updateNttScaleLabel);
      ringFamily.addEventListener("change", () => {
        updateNttScaleLabel();
        requestRecommendation();
      });

      updateNttScaleLabel();
      requestRecommendation();

      function requestRecommendation() {
        setStatus("loading", "Preview");
        const data = new FormData(form);
        const family = data.get("ringFamily");
        const result = JSON.parse(JSON.stringify(samples[family]));
        result.request.target_security = Number(data.get("targetSecurity"));
        result.request.security_model = data.get("securityModel");
        result.request.red_cost_model = data.get("redCostModel");
        result.request.ntt_scale_power = Number(data.get("nttScalePower"));
        result.request.min_q_bits = Number(data.get("minQBits"));
        result.request.max_q_bits = Number(data.get("maxQBits"));
        result.request.distribution = data.get("distribution");
        result.request.use_estimator = data.get("useEstimator") === "on";
        result.recommendation.selection.target_security = result.request.target_security;
        result.recommendation.selection.security_model = result.request.red_cost_model;
        result.recommendation.selection.margin_bits = round1(
          result.recommendation.selection.selected_security_bits - result.request.target_security,
        );
        result.recommendation.selection.meets_target = result.recommendation.selection.margin_bits >= 0;
        setTimeout(() => {
          lastResult = result;
          renderResult(result);
          setStatus("done", "Ready");
        }, 160);
      }

      function renderResult(result) {
        const candidate = result.recommendation;
        const target = result.request.target_security;
        const source = candidate.security.source === "sage-lattice-estimator" ? "Sage estimator" : "fast screen";

        title.textContent = `推荐 RLWE(${candidate.ring.n}, ${candidate.modulus.q})`;
        subtitle.textContent = `${source} · ${result.search.generated_candidates} 个候选 · ${result.search.elapsed_ms} ms · preview`;

        show(resultGrid, details, warnings, alternatives, jsonPanel);
        setText("#classic-bits", `${candidate.security.classical_bits} bits`);
        setText("#quantum-bits", `${candidate.security.quantum_bits} bits`);
        setText("#ring-n", String(candidate.ring.n));
        setText("#ring-poly", candidate.ring.polynomial);
        setText("#modulus-q", String(candidate.modulus.q));
        setText("#modulus-bits", `${candidate.modulus.bits} bits`);
        setText("#selected-bits", `${candidate.selection.selected_security_bits} bits`);
        setText("#security-margin", `margin ${signed(candidate.selection.margin_bits)} bits`);
        setMeter("#classic-meter", candidate.security.classical_bits, target);
        setMeter("#quantum-meter", candidate.security.quantum_bits, target);

        fillDefinitionList("#instance-list", [
          ["Family", candidate.ring.family],
          ["Ring", candidate.ring.quotient],
          ["Cyclotomic", `Phi_${candidate.ring.cyclotomic_index}, ${candidate.ring.family}`],
          ["NTT", candidate.modulus.ntt_condition],
          ["q - 1", candidate.modulus.q_minus_1_factorization],
          ["Split", candidate.modulus.polynomial_factorization],
          ["NTT quality", `${candidate.modulus.ntt_quality}, remaining layers ${candidate.modulus.ntt_layers_remaining}`],
          ["Secret", distributionText(candidate.distribution.secret)],
          ["Error", distributionText(candidate.distribution.error)],
        ]);

        fillDefinitionList("#security-list", [
          ["Source", candidate.security.source],
          ["MATZOV", `${candidate.security.matzov_bits || "n/a"} bits`],
          ["ADPS16", `${candidate.security.adps16_core_svp_bits || "n/a"} bits`],
          ["Classical", `${candidate.security.classical_bits} bits`],
          ["Quantum", `${candidate.security.quantum_bits} bits`],
          ["Target", `${result.request.target_security} bits (${result.request.red_cost_model})`],
          ["Margin", `${signed(candidate.selection.margin_bits)} bits`],
          ["Estimator", candidate.security.estimator_commit || "not applied"],
          ["Next", result.next_question],
        ]);

        warnings.innerHTML = "";
        candidate.warnings.forEach((warning) => {
          const p = document.createElement("p");
          p.textContent = warning;
          warnings.appendChild(p);
        });

        renderAlternatives(result.alternatives);
        jsonOutput.textContent = JSON.stringify(candidate, null, 2);
      }

      function renderAlternatives(items) {
        const list = document.querySelector("#candidate-list");
        list.innerHTML = "";
        items.forEach((item) => {
          const node = document.createElement("article");
          node.className = "candidate";
          node.innerHTML = `
            <strong>n=${item.ring.n}, q=${item.modulus.q}, ${item.distribution.name}</strong>
            <span>${item.selection.security_model}: ${item.selection.selected_security_bits} bits · margin ${signed(item.selection.margin_bits)}</span>
            <span>${item.modulus.ntt_quality} · ${item.modulus.ntt_condition}</span>
          `;
          list.appendChild(node);
        });
      }

      function distributionText(distribution) {
        return `${distribution.name}, sigma=${distribution.stddev}, support [${distribution.support.join(", ")}]`;
      }

      function fillDefinitionList(selector, rows) {
        const node = document.querySelector(selector);
        node.innerHTML = "";
        rows.forEach(([key, value]) => {
          const dt = document.createElement("dt");
          dt.textContent = key;
          const dd = document.createElement("dd");
          dd.textContent = value;
          node.append(dt, dd);
        });
      }

      function setMeter(selector, value, target) {
        const width = Math.max(4, Math.min(100, (Number(value) / Number(target)) * 100));
        document.querySelector(selector).style.width = `${width}%`;
      }

      function setText(selector, text) {
        document.querySelector(selector).textContent = text;
      }

      function show(...nodes) {
        nodes.forEach((node) => node.classList.remove("hidden"));
      }

      function setStatus(kind, text) {
        statusPill.className = `status-pill ${kind}`;
        statusPill.textContent = text;
      }

      function signed(value) {
        return value >= 0 ? `+${value}` : String(value);
      }

      function round1(value) {
        return Math.round(value * 10) / 10;
      }

      function updateNttScaleLabel() {
        const value = Number(nttScale.value);
        const ternary = ringFamily.value === "ternary";
        let label = ternary ? "6n" : "2n";
        if (ternary) {
          if (value === 0) label = "3n";
          if (value === 1) label = "3n/2";
          if (value > 1) label = `3n/2^${value}`;
        } else {
          if (value === 0) label = "n";
          if (value === 1) label = "n/2";
          if (value > 1) label = `n/2^${value}`;
        }
        nttScaleLabel.textContent = `NTT 尺度：${label} | q - 1`;
      }

      function cbd(name, variance, stddev) {
        return {
          name,
          mean: 0,
          variance,
          stddev,
          support: [-1, 1],
          symmetric: true,
          sampling: "bit-sliced popcount friendly",
